linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple

linters-settings:
  errcheck:
    check-blank: false
    exclude-functions:
      - (bytes.Buffer).WriteByte

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - ineffassign

run:
  timeout: 3m
