proxy:
  listen: "0.0.0.0:35432"
  shutdown_timeout: 5s

databases:
  testdb:
    writer:
      host: "127.0.0.1"
      port: 25432
    readers:
      - host: "127.0.0.1"
        port: 25432
    backend:
      user: "postgres"
      password: "postgres"
      database: "testdb"

pool:
  min_connections: 5
  max_connections: 20
  idle_timeout: 10m
  max_lifetime: 1h
  connection_timeout: 5s
  reset_query: "DISCARD ALL"

routing:
  read_after_write_delay: 0s

cache:
  enabled: false

firewall:
  enabled: false

metrics:
  enabled: false

admin:
  enabled: false
