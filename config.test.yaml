proxy:
  listen: "0.0.0.0:15440"

pool:
  min_connections: 2
  max_connections: 10
  idle_timeout: 5m
  max_lifetime: 30m
  connection_timeout: 3s

routing:
  read_after_write_delay: 500ms
  ast_parser: true

cache:
  enabled: true
  cache_ttl: 5s
  max_cache_entries: 1000
  max_result_size: "512KB"

databases:
  testdb:
    writer:
      host: "127.0.0.1"
      port: 15432
    readers:
      - host: "127.0.0.1"
        port: 15433
      - host: "127.0.0.1"
        port: 15434
    backend:
      user: "postgres"
      password: "postgres"
      database: "testdb"
    max_connections: 50

metrics:
  enabled: true
  listen: "0.0.0.0:19090"

admin:
  enabled: true
  listen: "0.0.0.0:19091"

# --- 신규 기능 활성화 ---

auth:
  enabled: true
  users:
    - username: "postgres"
      password: "postgres"
      max_connections: 0
    - username: "limited"
      password: "limited"
      max_connections: 3

firewall:
  enabled: true
  block_delete_without_where: true
  block_update_without_where: true
  block_drop_table: false
  block_truncate: false

connection_limits:
  enabled: true
  default_max_connections_per_user: 50
  default_max_connections_per_database: 50

session_compatibility:
  enabled: true
  mode: "warn"

data_api:
  enabled: true
  listen: "0.0.0.0:18080"
  api_keys:
    - "test-api-key-12345"

rate_limit:
  enabled: true
  rate: 10000
  burst: 5000

audit:
  enabled: true
  slow_query_threshold: 100ms
  log_all_queries: false

observability:
  sql_redaction: "literals"
