proxy:
  listen: "0.0.0.0:5432"

writer:
  host: "primary.db.internal"
  port: 5432

readers:
  - host: "replica-1.db.internal"
    port: 5432
  - host: "replica-2.db.internal"
    port: 5432

pool:
  min_connections: 5
  max_connections: 50
  idle_timeout: 10m
  max_lifetime: 1h
  connection_timeout: 5s

routing:
  read_after_write_delay: 500ms

cache:
  enabled: true
  cache_ttl: 10s
  max_cache_entries: 10000
  max_result_size: "1MB"

audit:
  enabled: false
  slow_query_threshold: 500ms
  log_all_queries: false
  webhook:
    enabled: false
    url: ""
    timeout: 5s

data_api:
  enabled: false
  listen: "0.0.0.0:8080"
  api_keys: []
