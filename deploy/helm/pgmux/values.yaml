replicaCount: 2

image:
  repository: pgmux
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# pgmux config.yaml contents
config:
  proxy:
    listen: "0.0.0.0:5432"
    shutdown_timeout: "30s"
    # client_idle_timeout: "5m"       # 0 = disabled (no idle timeout)
  pool:
    min_connections: 5
    max_connections: 50
    idle_timeout: "10m"
    max_lifetime: "1h"
    connection_timeout: "5s"
    query_timeout: "0s"              # 0 = unlimited. Per-query hint: /* timeout:5s */
    reset_query: "DISCARD ALL"
    prepared_statement_mode: "proxy"  # "proxy" | "multiplex"
  routing:
    read_after_write_delay: "500ms"
    causal_consistency: false
    ast_parser: false
  firewall:
    enabled: true
    block_delete_without_where: true
    block_update_without_where: true
    block_drop_table: false
    block_truncate: false
  session_compatibility:
    enabled: true
    mode: "warn"                     # "block" | "warn" | "pin" | "allow"
  observability:
    sql_redaction: "literals"        # "none" | "literals" | "full"
  circuit_breaker:
    enabled: false
    error_threshold: 0.5
    open_duration: "10s"
    half_open_max: 3
    window_size: 10
  rate_limit:
    enabled: false
    rate: 1000
    burst: 100
  cache:
    enabled: true
    cache_ttl: "10s"
    max_cache_entries: 10000
    max_result_size: "1MB"
  audit:
    enabled: false
    slow_query_threshold: "500ms"
    log_all_queries: false
  mirror:
    enabled: false
  digest:
    enabled: true
    max_patterns: 1000
    samples_per_pattern: 1000
  query_rewriting:
    enabled: false
  databases:
    mydb:
      writer:
        host: "primary.db.internal"
        port: 5432
      readers:
        - host: "replica-1.db.internal"
          port: 5432
      backend:
        user: "postgres"
        password: "postgres"
        database: "mydb"
  connection_limits:
    enabled: false
    default_max_connections_per_user: 100
    default_max_connections_per_database: 200
  auth:
    enabled: false
  metrics:
    enabled: true
    listen: "0.0.0.0:9090"
  admin:
    enabled: true
    listen: "0.0.0.0:9091"
  data_api:
    enabled: false
    listen: "0.0.0.0:8080"
  tls:
    enabled: false
  config:
    watch: false
  telemetry:
    enabled: false

service:
  type: ClusterIP
  port: 5432

metricsService:
  enabled: true
  port: 9090

adminService:
  enabled: true
  port: 9091

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: false
  interval: 15s
  labels: {}

grafanaDashboard:
  enabled: false
  labels: {}
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
